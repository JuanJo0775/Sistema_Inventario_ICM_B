[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = False
warn_unused_ignores = True
no_error_summary = False

# No imponer strict typing en tests ni migraciones
exclude = (migrations/|tests/|conftest\.py)

# Django model fields no requieren anotaciones de tipo explícitas
# Django FK _id y reverse relations no reconocidos sin django-stubs
[mypy-apps.*.models]
disable_error_code = var-annotated, attr-defined

[mypy-shared.models]
disable_error_code = var-annotated, attr-defined

[mypy-apps.*.services]
disable_error_code = attr-defined

[mypy-apps.*.selectors]
disable_error_code = attr-defined

[mypy-apps.*.views]
disable_error_code = attr-defined

# Apps críticas con type hints ya presentes
[mypy-apps.movements.services]
disallow_untyped_defs = True

[mypy-apps.catalog.services]
disallow_untyped_defs = True

[mypy-apps.inventory.services]
disallow_untyped_defs = True

[mypy-apps.purchasing.services]
disallow_untyped_defs = True

[mypy-apps.authentication.services]
disallow_untyped_defs = True

[mypy-apps.reports.services]
disallow_untyped_defs = True

[mypy-apps.alerts.services]
disallow_untyped_defs = True

[mypy-apps.audit.services]
disallow_untyped_defs = True

[mypy-shared.exceptions]
disallow_untyped_defs = True

[mypy-shared.location_validators]
disallow_untyped_defs = True
