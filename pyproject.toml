[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = ["E203", "E501", "B904", "N818"]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["E", "F", "W"]
"*/migrations/*" = ["E", "F", "W"]
"*/conftest.py" = ["E", "F", "W"]
"tests/**/*" = ["E", "F", "W"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
