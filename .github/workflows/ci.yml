name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  lint_test:
    name: Lint & Quick Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}

      - name: Install base dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt

      - name: Black & isort checks
        run: |
          pip install black==26.3.1 isort==5.13.2
          black --check .
          isort --check-only .

      - name: pip-audit (supply-chain scan)
        run: |
          pip install pip-audit
          pip-audit --progress=off --strict

      - name: Quick tests (unit-level)
        run: |
          pip install pytest pytest-django pytest-cov
          pytest -q -k "not integration and not ers" --maxfail=1 --junitxml=junit.xml --cov=.

      - name: Generate test docs (check)
        run: |
          python -m scripts.generate_docs --check

      - name: Django makemigrations check
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Upload artifacts (logs/coverage)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-artifacts
          path: |
            junit.xml
            .coverage

  integration_tests:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: lint_test
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_DB: icm_test
      POSTGRES_USER: icm
      POSTGRES_PASSWORD: icm_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: icm_test
          POSTGRES_USER: icm
          POSTGRES_PASSWORD: icm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U icm" --health-interval=5s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt
          pip install psycopg2-binary pytest pytest-django pytest-cov

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..30}; do pg_isready -h localhost -p 5432 -U icm && break || sleep 2; done

      - name: Run migrations and integration tests
        run: |
          export DATABASE_URL=postgres://icm:icm_pass@localhost:5432/icm_test
          python manage.py migrate --noinput
          pytest tests/integration -q || pytest -q tests/integration -q

  gherkin_tests:
    name: Gherkin / ERS scenarios
    runs-on: ubuntu-latest
    needs: [lint_test, integration_tests]
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for scenarios
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt
          pip install pytest pytest-django

      - name: Run Gherkin scenarios
        run: |
          pip install pytest-cov
          pytest tests/ers -q --junitxml=junit.xml --cov=.

      - name: Upload artifacts (gherkin logs)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gherkin-artifacts
          path: |
            junit.xml
            .coverage

  # build_and_push and image_scan removed - CI now runs tests only (lint_test, integration_tests)
