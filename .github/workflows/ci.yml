name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  lint_test:
    name: Lint & Quick Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}

      - name: Install base dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt

      - name: Black & isort checks
        run: |
          pip install black==23.12.1 isort==5.13.2
          black --check .
          isort --check-only .

      - name: pip-audit (supply-chain scan)
        run: |
          pip install pip-audit
          pip-audit --progress=off --strict

      - name: Quick tests (unit-level)
        run: |
          pip install pytest pytest-django pytest-cov
          pytest -q -k "not integration and not ers" --maxfail=1

      - name: Generate test docs (check)
        run: |
          python -m scripts.generate_docs --check

      - name: Django makemigrations check
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Upload artifacts (logs/coverage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            junit.xml
            .coverage

  image_scan:
    name: Image security scan
    runs-on: ubuntu-latest
    needs: lint_test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: icm-ci:${{ github.sha }}

      - name: Trivy scan image
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: icm-ci:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  integration_tests:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: lint_test
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_DB: icm_test
      POSTGRES_USER: icm
      POSTGRES_PASSWORD: icm_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: icm_test
          POSTGRES_USER: icm
          POSTGRES_PASSWORD: icm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U icm" --health-interval=5s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt
          pip install psycopg2-binary pytest pytest-django pytest-cov

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..30}; do pg_isready -h localhost -p 5432 -U icm && break || sleep 2; done

      - name: Run migrations and integration tests
        run: |
          export DATABASE_URL=postgres://icm:icm_pass@localhost:5432/icm_test
          python manage.py migrate --noinput
          pytest tests/integration -q || pytest -q tests/integration -q

  build_and_push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    needs: [lint_test, integration_tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Create release manifest (image digest)
        run: |
          if [ -z "${{ steps.build.outputs.digest }}" ]; then
            echo "No digest produced by build step" >&2
            exit 2
          fi
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}@${{ steps.build.outputs.digest }}
          echo "{\"image\": \"${IMAGE}\", \"ref\": \"${{ github.sha }}\"}" > release-manifest.json
          cat release-manifest.json
      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json
      - name: Sign image with cosign (keyless optional)
        if: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}@${{ steps.build.outputs.digest }}
          echo "Signing ${IMAGE}"
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          ./cosign sign --key cosign.key "${IMAGE}"
          rm -f cosign.key
      - name: Create or update GitHub release for rollback history
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          body: |
            Immutable artifact release
            - commit: ${{ github.sha }}
            - image: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}@${{ steps.build.outputs.digest }}
          files: release-manifest.json
