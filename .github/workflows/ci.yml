name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline de CI — Sistema Inventario ICM
#
# Jobs y orden:
#
#   quality ──► unit_tests ──► integration_gherkin ──► concurrency_tests
#                                       │
#                                       └──► load_test  (solo main + manual)
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Quality gate ────────────────────────────────────────────────────────
  # Formato, seguridad estática, migraciones y documentación de tests.
  # Corre rápido sin base de datos — falla pronto si hay un problema básico.
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: "Quality — lint · format · docs · migrations"
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt
          pip install bandit pip-audit

      - name: Formatting — black
        run: black --check .

      - name: Formatting — isort
        run: isort --check-only .

      - name: SAST — bandit
        continue-on-error: true
        run: bandit -r apps shared -ll || true

      - name: Supply-chain — pip-audit
        continue-on-error: true
        run: pip-audit --progress=off || true

      - name: Migrations up-to-date
        run: python manage.py makemigrations --check --dry-run

      - name: Test documentation in sync
        run: python -m scripts.generate_docs --check


  # ── 2. Tests unitarios — SQLite, sin base de datos externa ────────────────
  # Pruebas rápidas de servicios y vistas. No necesitan Postgres.
  # ──────────────────────────────────────────────────────────────────────────
  unit_tests:
    name: "Unit tests (SQLite)"
    runs-on: ubuntu-latest
    needs: quality
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt

      - name: Run unit tests
        run: |
          pytest apps/ -q \
            --ignore=tests \
            --junitxml=junit-unit.xml \
            --cov=apps \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-results
          path: |
            junit-unit.xml
            coverage-unit.xml


  # ── 3. Integración y Gherkin — Postgres ───────────────────────────────────
  # Escenarios del ERS (RF001–RF025, RNF003–RNF006) y tests de integración.
  # Requiere Postgres porque algunos escenarios verifican comportamiento
  # transaccional real (SELECT FOR UPDATE, constraints, etc.).
  # ──────────────────────────────────────────────────────────────────────────
  integration_gherkin:
    name: "Integration & Gherkin (Postgres)"
    runs-on: ubuntu-latest
    needs: unit_tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: icm_test
          POSTGRES_USER: icm
          POSTGRES_PASSWORD: icm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U icm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://icm:icm_pass@localhost:5432/icm_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run integration tests
        run: |
          pytest tests/integration -q \
            --junitxml=junit-integration.xml \
            --cov=apps \
            --cov-report=xml:coverage-integration.xml

      - name: Run Gherkin / ERS scenarios
        run: |
          pytest tests/ers -q \
            --junitxml=junit-gherkin.xml \
            --cov=apps \
            --cov-append \
            --cov-report=xml:coverage-gherkin.xml

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-gherkin-results
          path: |
            junit-integration.xml
            junit-gherkin.xml
            coverage-integration.xml
            coverage-gherkin.xml


  # ── 4. Concurrencia — Postgres + SELECT FOR UPDATE ────────────────────────
  # Verifica que movimientos concurrentes no producen stock negativo.
  # Solo tiene sentido en Postgres (SQLite no garantiza semántica de bloqueo).
  # ──────────────────────────────────────────────────────────────────────────
  concurrency_tests:
    name: "Concurrency tests (Postgres)"
    runs-on: ubuntu-latest
    needs: integration_gherkin

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: icm_test
          POSTGRES_USER: icm
          POSTGRES_PASSWORD: icm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U icm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://icm:icm_pass@localhost:5432/icm_test
      RUN_CONCURRENCY_TESTS: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements/base.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run concurrency tests
        run: |
          pytest tests/concurrency -v \
            --junitxml=junit-concurrency.xml

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: concurrency-results
          path: junit-concurrency.xml


  # ── 5. Load test — Locust contra servidor vivo ────────────────────────────
  # Simula 10 usuarios concurrentes durante 30 s y reporta throughput / latencia.
  # Solo se ejecuta en push a main y en triggers manuales (workflow_dispatch)
  # para no ralentizar cada PR. No bloquea el merge — es informativo.
  #
  # Para lanzarlo manualmente en cualquier rama:
  #   GitHub → Actions → CI → Run workflow
  # ──────────────────────────────────────────────────────────────────────────
  load_test:
    name: "Load test (Locust)"
    runs-on: ubuntu-latest
    needs: integration_gherkin
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: icm_test
          POSTGRES_USER: icm
          POSTGRES_PASSWORD: icm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U icm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://icm:icm_pass@localhost:5432/icm_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies (includes locust)
        run: |
          python -m pip install -U pip
          pip install -r requirements/development.txt

      - name: Run migrations and seed test user
        run: |
          python manage.py migrate --noinput
          python manage.py shell -c "
          from django.contrib.auth import get_user_model
          from apps.authentication.models import UserRole
          User = get_user_model()
          if not User.objects.filter(username='almacenista').exists():
              User.objects.create_user('almacenista', password='testpass123', role=UserRole.ALMACENISTA)
          print('User ready.')
          "

      - name: Start Django server
        run: |
          python manage.py runserver 0.0.0.0:8000 --noreload &
          echo $! > .server.pid
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/api/v1/auth/login/ > /dev/null && echo "Server is up." && break || sleep 1
          done

      - name: Run Locust load test
        run: |
          locust -f tests/performance/locustfile.py \
            --headless \
            -H http://localhost:8000 \
            -u 10 -r 2 \
            --run-time 30s \
            --only-summary \
            --csv=locust-results

      - name: Stop Django server
        if: always()
        run: kill $(cat .server.pid) 2>/dev/null || true

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: locust-results
          path: locust-results_*.csv
