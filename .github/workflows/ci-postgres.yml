name: CI — Tests (Postgres)

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  test-postgres:
    name: Run tests against Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/testdb

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          if [ -f requirements/development.txt ]; then pip install -r requirements/development.txt; fi

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break || sleep 1
          done

      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      - name: Run tests (including concurrency) with coverage
        run: |
          pytest -q --cov=apps --cov-report=xml --cov-fail-under=85

      - name: Run pip-audit
        continue-on-error: true
        run: |
          python -m pip_audit -f json -o pip_audit.json || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload pip-audit artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pip-audit
          path: pip_audit.json
