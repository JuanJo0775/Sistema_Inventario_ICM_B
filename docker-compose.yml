services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-icm_db}
      POSTGRES_USER: ${DB_USER:-icm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icm_password}
    ports:
      - "${DB_PORT_MAP:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-icm_user} -d ${DB_NAME:-icm_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT_MAP:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
