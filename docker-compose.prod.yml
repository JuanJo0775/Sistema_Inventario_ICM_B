services:
  db:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-icm_db}
      POSTGRES_USER: ${DB_USER:-icm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icm_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-icm_user} -d ${DB_NAME:-icm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_DEBUG: "False"
    ports:
      - "${WEB_PORT_MAP:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
