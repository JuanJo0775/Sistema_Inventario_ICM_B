          type: string
        storage_type_code:
          type: string
          nullable: true
        storage_type_name:
          type: string
          nullable: true
      required:
      - capacity_configured
      - capacity_level
      - capacity_mode
      - capacity_score
      - capacity_units
      - code
      - is_retail
      - location_id
      - name
      - occupancy_estimate_pct
      - occupied_units
      - operational_status
      - storage_type_code
      - storage_type_name
      - utilization_pct
    WarehouseUtilizationOperationalStatus:
      type: object
      properties:
        operational_status:
          type: string
        locations:
          type: integer
        occupied_units:
          type: integer
      required:
      - locations
      - occupied_units
      - operational_status
    WarehouseUtilizationResponse:
      type: object
      properties:
        overall:
          $ref: '#/components/schemas/WarehouseUtilizationSummary'
        by_location:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseUtilizationLocation'
        by_storage_type:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseUtilizationStorageType'
        by_operational_status:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseUtilizationOperationalStatus'
