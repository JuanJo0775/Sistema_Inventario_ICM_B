        morning_end:
          type: string
          format: time
          nullable: true
        afternoon_start:
          type: string
          format: time
          nullable: true
        afternoon_end:
          type: string
          format: time
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
