      - unconfigured_occupied_units
      - utilization_pct
    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        endpoint:
          type: string
          format: uuid
          readOnly: true
        endpoint_url:
          type: string
          readOnly: true
        event_type:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/WebhookDeliveryStatusEnum'
          readOnly: true
        attempts:
          type: integer
          readOnly: true
        last_attempt_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        next_retry_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        response_code:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
      required:
      - attempts
      - created_at
      - endpoint
      - endpoint_url
      - event_type
      - id
      - last_attempt_at
      - next_retry_at
      - response_code
      - status
    WebhookDeliveryStatusEnum:
      enum:
      - PENDING
      - DELIVERED
      - FAILED
      type: string
      description: |-
        * `PENDING` - Pendiente
        * `DELIVERED` - Entregado
        * `FAILED` - Fallido
    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          maxLength: 500
        events:
          description: 'Lista de event_types suscritos. Ej: ["STOCK_CRITICO"].'
        is_active:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Soft delete timestamp. NULL = activo; not-NULL = eliminado
            lógicamente.
        max_retries:
          type: integer
          maximum: 32767
          minimum: 0
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - created_at
      - created_by
      - deleted_at
      - id
      - updated_at
      - url
    WebhookEndpointCreateRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          maxLength: 500
        secret:
          type: string
          minLength: 8
          maxLength: 128
        events:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
          description: 'Lista de event_types a suscribir. Ej: ["dispatch.completed"].'
          minItems: 1
        is_active:
          type: boolean
          default: true
        max_retries:
          type: integer
          maximum: 10
          minimum: 1
          default: 3
      required:
      - events
      - secret
      - url
    WebhookStatsResponse:
      type: object
      properties:
        pending:
          type: integer
        delivered:
          type: integer
        failed:
          type: integer
        active_endpoints:
          type: integer
      required:
      - active_endpoints
      - delivered
      - failed
      - pending
    WebhookTestRequest:
      type: object
      properties:
        event_type:
          type: string
          minLength: 1
          default: TEST
          maxLength: 64
        payload:
          type: object
          additionalProperties: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Prefijo literal: Bearer + espacio + access_token (login o refresh).'
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: auth
  description: JWT authentication and user management.
- name: system
  description: System availability checks.
- name: catalog
  description: Categories, products, combos and SKU management.
- name: inventory
  description: Locations and stock tracking.
- name: movements
  description: 'Ledger: entries, dispatches, transfers, returns, adjustments and invoices.'
- name: dashboard
  description: Operational read model for executive UI and KPIs.
- name: reports
  description: Read-only reports and KPIs.
- name: alerts
  description: Operational alerts and real-time polling.
- name: audit
  description: Audit logs (read-only, immutable).
- name: webhooks
  description: Webhook endpoints and delivery management (almacenista only — IsAlmacenista).
- name: billing
  description: 'Commercial billing: multi-product invoices, void, stats and company
    config.'
