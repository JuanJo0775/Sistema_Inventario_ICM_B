      - per_location
      - product_id
      - total
    StockReconstructRequestRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
      required:
      - location_id
      - product_id
    StockReconstructResponse:
      type: object
      properties:
        status:
          type: string
        reconstructed:
          type: integer
        actual:
          type: integer
      required:
      - actual
      - reconstructed
      - status
    Subcategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        category:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 128
          pattern: ^[-a-zA-Z0-9_]+$
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - category
      - created_at
      - id
      - name
      - slug
      - updated_at
    TopDispatchedProduct:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        dispatched_quantity:
          type: integer
      required:
      - dispatched_quantity
      - name
      - product_id
      - sku
    TransferCreateRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        origin_id:
          type: string
          format: uuid
        destination_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        cold_chain_acknowledged:
          type: boolean
          default: false
        electrical_safety_acknowledged:
          type: boolean
          default: false
      required:
      - destination_id
      - origin_id
      - product_id
      - quantity
    User:
      type: object
      description: Perfil de usuario (RF-002) — lectura y actualización parcial por
        almacenista.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Correo electrónico
          maxLength: 254
        first_name:
          type: string
          title: Nombre
          maxLength: 150
        last_name:
          type: string
          title: Apellidos
          maxLength: 150
        phone:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Activo
          description: Indica si el usuario debe ser tratado como activo. Desmarque
            esta opción en lugar de borrar la cuenta.
        is_staff:
          type: boolean
          readOnly: true
          title: Es staff
          description: Indica si el usuario puede entrar en este sitio de administración.
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Último inicio de sesión
      required:
      - created_at
      - created_by
      - email
      - id
      - is_staff
      - last_login
      - role
      - updated_at
      - username
    UserCreateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        email:
          type: string
          format: email
          minLength: 1
        first_name:
          type: string
          default: ''
        last_name:
          type: string
          default: ''
        phone:
          type: string
          default: ''
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password
      - role
      - username
    UserRequest:
      type: object
      description: Perfil de usuario (RF-002) — lectura y actualización parcial por
        almacenista.
      properties:
        username:
          type: string
          minLength: 1
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          title: Correo electrónico
          maxLength: 254
        first_name:
          type: string
          title: Nombre
          maxLength: 150
        last_name:
          type: string
          title: Apellidos
          maxLength: 150
        phone:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Activo
          description: Indica si el usuario debe ser tratado como activo. Desmarque
            esta opción en lugar de borrar la cuenta.
      required:
      - email
      - role
      - username
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Prefijo literal: Bearer + espacio + access_token (login o refresh).'
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
