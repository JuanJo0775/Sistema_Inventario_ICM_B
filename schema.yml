          maxLength: 200
        nit:
          type: string
          maxLength: 50
        address:
          type: string
        phone:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
        dian_resolution:
          type: string
        dian_range_from:
          type: integer
          nullable: true
        dian_range_to:
          type: integer
          nullable: true
        invoice_series:
          type: string
          minLength: 1
          maxLength: 10
        invoice_footer:
          type: string
      required:
      - company_name
    CorrectionCreateRequest:
      type: object
      properties:
