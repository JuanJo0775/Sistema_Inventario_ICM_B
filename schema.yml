    UserScheduleRequest:
      type: object
      properties:
        morning_start:
          type: string
          format: time
          nullable: true
        morning_end:
          type: string
          format: time
          nullable: true
        afternoon_start:
          type: string
          format: time
          nullable: true
        afternoon_end:
          type: string
          format: time
          nullable: true
        is_active:
          type: boolean
    WarehouseUtilizationLocation:
      type: object
      properties:
        location_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        occupied_units:
          type: integer
        capacity_units:
          type: integer
          nullable: true
        utilization_pct:
          type: number
          format: double
          nullable: true
        is_retail:
          type: boolean
        capacity_configured:
          type: boolean
        capacity_mode:
          type: string
        capacity_level:
          type: integer
          nullable: true
        capacity_score:
          type: integer
          nullable: true
        occupancy_estimate_pct:
          type: number
          format: double
          nullable: true
