components:
  schemas:
    AdjustmentCorrectionRequest:
      type: object
      description: Cuerpo para `POST .../adjustments/correct/` con id de movimiento.
      properties:
        movement_id:
          type: string
          format: uuid
        origin_id:
          type: string
          format: uuid
        destination_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required:
      - destination_id
      - movement_id
      - origin_id
      - quantity
    AdjustmentCreateRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        new_quantity:
          type: integer
          minimum: 0
        justification:
          type: string
      required:
      - justification
      - location_id
      - new_quantity
      - product_id
    Alert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: string
          format: uuid
          readOnly: true
        product_sku:
          type: string
          readOnly: true
        location:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        alert_type:
          allOf:
          - $ref: '#/components/schemas/AlertTypeEnum'
          readOnly: true
        message:
          type: string
          readOnly: true
        is_resolved:
          type: boolean
          readOnly: true
        resolved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        resolved_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - alert_type
      - created_at
      - id
      - is_resolved
      - location
      - message
      - product
      - product_sku
      - resolved_at
      - resolved_by
    AlertTypeEnum:
      enum:
      - LOW_STOCK
      - EXPIRATION_30
      - EXPIRATION_60
      - COLD_CHAIN_MISSING
      - STOCK_MISMATCH
      type: string
      description: |-
        * `LOW_STOCK` - Stock bajo mínimo
        * `EXPIRATION_30` - Vencimiento en 30 días
        * `EXPIRATION_60` - Vencimiento en 60 días
        * `COLD_CHAIN_MISSING` - Cadena de frío irregular
        * `STOCK_MISMATCH` - Desincronización stock vs ledger
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          allOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        movement:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        description:
          type: string
          readOnly: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - event_type
      - id
      - ip_address
      - metadata
      - movement
      - user
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 128
          pattern: ^[-a-zA-Z0-9_]+$
        requires_serial_number:
          type: boolean
          description: 'BR-04: categoría exige número de serie en entradas/salidas.'
        is_returnable:
          type: boolean
          description: 'BR-05: categoría admite devoluciones (Electroterapia / electrónicos).'
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - created_at
      - id
      - name
      - slug
      - updated_at
    CategoryCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ''
        requires_serial_number:
          type: boolean
          default: false
        is_returnable:
          type: boolean
          default: false
      required:
      - name
    CodeEnum:
      enum:
      - VITRINA
      - BODEGA_1
      - BODEGA_2
      type: string
      description: |-
        * `VITRINA` - Vitrina
        * `BODEGA_1` - Bodega 1
        * `BODEGA_2` - Bodega 2
    Combo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        sku:
          type: string
          maxLength: 100
        is_active:
          type: boolean
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComboItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
