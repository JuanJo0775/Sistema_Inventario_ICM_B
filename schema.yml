      - quantity
    User:
      type: object
      description: Perfil de usuario (RF-002) — lectura y actualización parcial por
        almacenista.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Correo electrónico
          maxLength: 254
        first_name:
          type: string
          title: Nombre
          maxLength: 150
        last_name:
          type: string
          title: Apellidos
          maxLength: 150
        phone:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          readOnly: true
          title: Activo
          description: Indica si el usuario debe ser tratado como activo. Desmarque
            esta opción en lugar de borrar la cuenta.
        is_staff:
          type: boolean
          readOnly: true
          title: Es staff
          description: Indica si el usuario puede entrar en este sitio de administración.
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_by_username:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Último inicio de sesión
      required:
      - created_at
      - created_by
      - created_by_username
      - email
      - id
      - is_active
      - is_staff
      - last_login
      - role
      - updated_at
      - username
    UserCreateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        email:
          type: string
          format: email
          minLength: 1
        first_name:
          type: string
          default: ''
        last_name:
          type: string
          default: ''
        phone:
          type: string
          default: ''
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password
      - role
      - username
    UserRequest:
      type: object
      description: Perfil de usuario (RF-002) — lectura y actualización parcial por
        almacenista.
      properties:
        username:
          type: string
          minLength: 1
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          title: Correo electrónico
          maxLength: 254
        first_name:
          type: string
          title: Nombre
          maxLength: 150
        last_name:
          type: string
          title: Apellidos
          maxLength: 150
        phone:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - role
      - username
    UserSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        morning_start:
          type: string
          format: time
