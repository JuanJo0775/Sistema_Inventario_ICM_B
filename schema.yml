  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: RF-001 — El usuario autenticado cambia su propia contraseña proporcionando
        la contraseña actual y la nueva. Invalida todos los tokens JWT activos (fuerza
        re-login) y registra evento de auditoría.
      summary: Cambiar contraseña (self-service)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
