components:
  schemas:
    AdjustmentCorrectionRequest:
      type: object
      description: Cuerpo para `POST .../adjustments/correct/` con id de movimiento.
      properties:
        movement_id:
          type: string
          format: uuid
        origin_id:
          type: string
          format: uuid
        destination_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        serial_id:
          type: string
          format: uuid
          nullable: true
          description: UUID del ProductSerial.
      required:
      - destination_id
      - movement_id
      - origin_id
      - quantity
    AdjustmentCreateRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        new_quantity:
          type: integer
          minimum: 0
        justification:
          type: string
        lot_id:
          type: string
          format: uuid
          nullable: true
          description: Lote a asociar. Obligatorio si el ajuste incrementa stock de
            un producto con vencimiento (requires_expiration=True); opcional si reduce
            stock (se infiere por FEFO cuando es posible).
        serial_number:
          type: string
          nullable: true
          description: Número de serie del equipo a ajustar.
      required:
      - justification
      - location_id
      - new_quantity
      - product_id
    Alert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: string
          format: uuid
          readOnly: true
        product_sku:
          type: string
          readOnly: true
        lot:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        lot_code:
          type: string
          readOnly: true
        lot_expiration_date:
          type: string
          format: date
          readOnly: true
        location:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        alert_type:
          allOf:
          - $ref: '#/components/schemas/AlertTypeEnum'
          readOnly: true
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          readOnly: true
        message:
          type: string
          readOnly: true
        is_resolved:
          type: boolean
          readOnly: true
        resolved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        resolved_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - alert_type
      - category
      - created_at
      - id
      - is_resolved
      - location
      - lot
      - lot_code
      - lot_expiration_date
      - message
      - product
      - product_sku
      - resolved_at
      - resolved_by
      - severity
    AlertStats:
      type: object
      properties:
        total_active:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer
        by_category:
          type: object
          additionalProperties:
            type: integer
        generated_at:
          type: string
      required:
      - by_category
      - by_severity
      - generated_at
      - total_active
    AlertTypeEnum:
      enum:
      - LOW_STOCK
      - EXPIRATION_30
      - EXPIRATION_60
      - LOT_EXPIRED
      - COLD_CHAIN_MISSING
      - LOCATION_BLOCKED_WITH_STOCK
      - STOCK_MISMATCH
      - STOCK_ZERO
      type: string
      description: |-
        * `LOW_STOCK` - Stock bajo mínimo
        * `EXPIRATION_30` - Vencimiento en 30 días
        * `EXPIRATION_60` - Vencimiento en 60 días
        * `LOT_EXPIRED` - Lote vencido
        * `COLD_CHAIN_MISSING` - Cadena de frío irregular
        * `LOCATION_BLOCKED_WITH_STOCK` - Ubicación bloqueada con stock
        * `STOCK_MISMATCH` - Desincronización stock vs ledger
        * `STOCK_ZERO` - Producto sin stock
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          allOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        movement:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        description:
          type: string
          readOnly: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - event_type
      - id
      - ip_address
      - metadata
      - movement
      - user
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 128
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        is_active:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Soft delete timestamp. NULL = activo; not-NULL = eliminado
            lógicamente.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - created_at
      - deleted_at
      - id
      - name
      - slug
      - updated_at
    BrandCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ''
      required:
      - name
    BrandUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        is_active:
          type: boolean
    CapacityModeEnum:
      enum:
      - none
      - relative_scale
      - absolute_legacy
      type: string
      description: |-
        * `none` - Sin capacidad
        * `relative_scale` - Escala relativa
        * `absolute_legacy` - Capacidad absoluta (legacy)
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 128
          pattern: ^[-a-zA-Z0-9_]+$
        requires_serial_number:
          type: boolean
          description: 'BR-04: categoría exige número de serie en entradas/salidas.'
        is_returnable:
          type: boolean
          description: 'BR-05: categoría admite devoluciones (Electroterapia / electrónicos).'
        description:
          type: string
        is_active:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Soft delete timestamp. NULL = activo; not-NULL = eliminado
            lógicamente.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - created_at
      - deleted_at
      - id
      - name
      - slug
      - updated_at
    CategoryCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ''
        requires_serial_number:
          type: boolean
          default: false
        is_returnable:
          type: boolean
          default: false
      required:
      - name
    CategoryEnum:
      enum:
      - STOCK
      - EXPIRATION
      - LOCATION
      - INTEGRITY
      - BUSINESS
      type: string
      description: |-
        * `STOCK` - Stock
        * `EXPIRATION` - Vencimiento
        * `LOCATION` - Ubicación
        * `INTEGRITY` - Integridad
        * `BUSINESS` - Negocio
    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        requires_serial_number:
          type: boolean
        is_returnable:
          type: boolean
        is_active:
          type: boolean
    ChangePasswordRequest:
      type: object
      description: Cambio de contraseña self-service (RF-001).
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - current_password
      - new_password
      - new_password_confirm
    Combo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        sku:
          type: string
          maxLength: 100
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Soft delete timestamp. NULL = activo; not-NULL = eliminado
            lógicamente.
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComboItem'
          readOnly: true
        available_quantity:
          type: string
          readOnly: true
        price_strategy:
          allOf:
          - $ref: '#/components/schemas/ComboPriceStrategyEnum'
          readOnly: true
          description: |-
            derived: suma de precios de componentes. fixed: precio fijo del combo.

            * `derived` - Derivado de componentes
            * `fixed` - Precio fijo del combo
        fixed_price_retail:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          readOnly: true
          nullable: true
          description: Precio fijo al por menor del combo (si price_strategy=fixed).
        fixed_price_wholesale:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          readOnly: true
          nullable: true
          description: Precio fijo al por mayor del combo (si price_strategy=fixed).
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de creación (UTC).
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Fecha y hora de última modificación (UTC).
      required:
      - available_quantity
      - components
      - created_at
      - deleted_at
      - fixed_price_retail
      - fixed_price_wholesale
      - id
      - name
      - price_strategy
      - sku
      - updated_at
    ComboCreateItemRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          description: UUID del producto
        quantity:
          type: integer
          minimum: 1
          default: 1
          description: Cantidad del producto en el combo
      required:
      - product_id
    ComboCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/ComboCreateItemRequest'
        price_strategy:
          allOf:
          - $ref: '#/components/schemas/PriceStrategyEnum'
          default: derived
        fixed_price_retail:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        fixed_price_wholesale:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
      required:
      - items
      - name
      - sku
    ComboDispatchRequest:
      type: object
      description: Despacho de un combo completo desde una ubicación (RF-003, Opción
        B).
      properties:
        combo_id:
          type: string
          format: uuid
          description: UUID del combo a despachar.
        location_id:
          type: string
          format: uuid
          description: UUID de la ubicación desde donde se descuentan los productos.
        serial_id:
          type: string
          format: uuid
          nullable: true
          description: UUID del ProductSerial. Obligatorio si algún componente requiere
            serial.
      required:
      - combo_id
      - location_id
    ComboItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - product
    ComboPriceStrategyEnum:
      enum:
      - derived
      - fixed
      type: string
      description: |-
        * `derived` - Derivado de componentes
        * `fixed` - Precio fijo del combo
    ComboUpdateItemRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
      - product_id
    ComboUpdateRequest:
      type: object
      description: Campos editables de un combo. is_active no se acepta; usar DELETE/restore.
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/ComboUpdateItemRequest'
        price_strategy:
          $ref: '#/components/schemas/PriceStrategyEnum'
        fixed_price_retail:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        fixed_price_wholesale:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
    CompanyInfo:
