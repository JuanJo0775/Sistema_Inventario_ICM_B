          allOf:
          - $ref: '#/components/schemas/OperationalStatusEnum'
          description: |-
            Estado operativo de la ubicación para reglas de movimientos.

            * `active` - Activa
            * `maintenance` - Mantenimiento
            * `restricted` - Restringida
            * `blocked` - Bloqueada
            * `archived` - Archivada
        capacity_mode:
          allOf:
          - $ref: '#/components/schemas/CapacityModeEnum'
          description: |-
            Modo de capacidad para cálculo de ocupación informativa.

            * `none` - Sin capacidad
            * `relative_scale` - Escala relativa
            * `absolute_legacy` - Capacidad absoluta (legacy)
        capacity_level:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: Escala relativa (1-5) cuando capacity_mode=relative_scale.
        capacity_score:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Puntaje de capacidad relativo (unidad abstracta, no bloqueante).
        occupancy_estimate_pct:
          type: number
          format: double
          nullable: true
          description: Estimación informativa de ocupación calculada o ajustada.
        is_active:
          type: boolean
